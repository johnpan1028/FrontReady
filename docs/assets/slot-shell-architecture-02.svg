<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="28" fill="#F8FAFC"/>
  <text x="64" y="74" fill="#0F172A" font-size="34" font-family="Arial, sans-serif" font-weight="700">Dual Inspector Context</text>
  <text x="64" y="110" fill="#475569" font-size="18" font-family="Arial, sans-serif">One Slot Shell widget, two editing contexts</text>

  <rect x="104" y="170" width="284" height="420" rx="28" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="2"/>
  <text x="142" y="222" fill="#0369A1" font-size="28" font-family="Arial, sans-serif" font-weight="700">Click Shell Body</text>
  <text x="142" y="262" fill="#075985" font-size="20" font-family="Arial, sans-serif">Enter shell inspector</text>
  <rect x="142" y="304" width="208" height="50" rx="18" fill="white" stroke="#BAE6FD"/>
  <text x="170" y="336" fill="#0F172A" font-size="18" font-family="Arial, sans-serif">Rows / Columns</text>
  <rect x="142" y="370" width="208" height="50" rx="18" fill="white" stroke="#BAE6FD"/>
  <text x="170" y="402" fill="#0F172A" font-size="18" font-family="Arial, sans-serif">Duplicate Row</text>
  <rect x="142" y="436" width="208" height="50" rx="18" fill="white" stroke="#BAE6FD"/>
  <text x="170" y="468" fill="#0F172A" font-size="18" font-family="Arial, sans-serif">Add / Remove Row</text>
  <rect x="142" y="502" width="208" height="50" rx="18" fill="white" stroke="#BAE6FD"/>
  <text x="170" y="534" fill="#0F172A" font-size="18" font-family="Arial, sans-serif">Structure only</text>

  <rect x="454" y="240" width="292" height="280" rx="32" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="496" y="292" fill="#0F172A" font-size="28" font-family="Arial, sans-serif" font-weight="700">One Widget</text>
  <text x="496" y="332" fill="#475569" font-size="20" font-family="Arial, sans-serif">Shell selection and slot selection</text>
  <rect x="496" y="382" width="208" height="84" rx="20" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="8 8"/>
  <text x="570" y="430" fill="#64748B" font-size="34" font-family="Arial, sans-serif" font-weight="700">+</text>
  <text x="520" y="486" fill="#64748B" font-size="16" font-family="Arial, sans-serif">Empty slot stays inside the same shell</text>

  <rect x="812" y="170" width="284" height="420" rx="28" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
  <text x="850" y="222" fill="#15803D" font-size="28" font-family="Arial, sans-serif" font-weight="700">Click Slot Cell / +</text>
  <text x="850" y="262" fill="#166534" font-size="20" font-family="Arial, sans-serif">Enter slot inspector</text>
  <rect x="850" y="304" width="208" height="50" rx="18" fill="white" stroke="#BBF7D0"/>
  <text x="882" y="336" fill="#0F172A" font-size="18" font-family="Arial, sans-serif">Type / Size</text>
  <rect x="850" y="370" width="208" height="50" rx="18" fill="white" stroke="#BBF7D0"/>
  <text x="882" y="402" fill="#0F172A" font-size="18" font-family="Arial, sans-serif">Span / Align</text>
  <rect x="850" y="436" width="208" height="50" rx="18" fill="white" stroke="#BBF7D0"/>
  <text x="882" y="468" fill="#0F172A" font-size="18" font-family="Arial, sans-serif">Text / Media / Object</text>
  <rect x="850" y="502" width="208" height="50" rx="18" fill="white" stroke="#BBF7D0"/>
  <text x="882" y="534" fill="#0F172A" font-size="18" font-family="Arial, sans-serif">Slot-level Actions</text>

  <path d="M388 380H444" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M812 380H756" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
</svg>
