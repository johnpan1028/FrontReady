  <text x="258" y="552" fill="#15803D" font-size="28" font-family="Arial, sans-serif" font-weight="700">Control = One Slot Shell</text>
  <text x="258" y="584" fill="#166534" font-size="18" font-family="Arial, sans-serif">The control asset is no longer a hard-coded button / heading / paragraph primitive</text>

  <path d="M600 614L600 654" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M600 654L586 638" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
