<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="28" fill="#F8FAFC"/>
  <text x="64" y="74" fill="#0F172A" font-size="34" font-family="Arial, sans-serif" font-weight="700">Slot Shell Product Stack</text>
  <text x="64" y="110" fill="#475569" font-size="18" font-family="Arial, sans-serif">Final editor hierarchy for Kit Studio v2</text>

  <rect x="120" y="150" width="960" height="104" rx="24" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="160" y="200" fill="#1D4ED8" font-size="28" font-family="Arial, sans-serif" font-weight="700">Page / Overlay Shell</text>
  <text x="160" y="232" fill="#1E3A8A" font-size="18" font-family="Arial, sans-serif">Top-level board shell that hosts cards and direct controls</text>

  <path d="M600 266L600 306" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M600 306L586 290" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M600 306L614 290" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>

  <rect x="160" y="324" width="880" height="110" rx="24" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="2"/>
  <text x="200" y="372" fill="#6D28D9" font-size="28" font-family="Arial, sans-serif" font-weight="700">Card = Card Shell + Controls</text>
  <text x="200" y="404" fill="#5B21B6" font-size="18" font-family="Arial, sans-serif">Card shell owns boundary, padding, header / footer, overflow; controls stay independent inside</text>

  <path d="M600 446L600 486" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
